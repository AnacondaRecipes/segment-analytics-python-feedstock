{% set name = "segment-analytics-python" %}
{% set version = "2.2.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/segment-analytics-python/segment-analytics-python-2.2.3.tar.gz
  sha256: 0df5908e3df74b4482f33392fdd450df4c8351bf54974376fbe6bf33b0700865

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  skip: true  # [py<39]

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - requests >=2.7,<3.0
    - backoff >=2.1,<3.0
    - python-dateutil >=2.2,<3.0
    - monotonic >=1.5,<2.0

test:
  source_files:
    - segment/analytics/test
  imports:
    - segment.analytics
  commands:
    - pip check
    - pytest segment/analytics/test -v -k "not (test_upload_interval or test_oauth)"  # Skip flaky tests
  requires:
    - python
    - pip
    - pytest
    - mock
    - pylint
    - flake8
    - cryptography

about:
  home: https://github.com/segmentio/analytics-python
  summary: The hassle-free way to integrate analytics into any python application.
  description: |
      Segment is the simplest way to integrate analytics into your application.
      One API allows you to turn on any other analytics service. No more learning
      new APIs, repeated code, and wasted development time.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/segmentio/analytics-python
  doc_url: https://github.com/segmentio/analytics-python/blob/master/README.md

extra:
  recipe-maintainers:
    - xylar
