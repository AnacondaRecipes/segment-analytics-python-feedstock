{% set name = "segment-analytics-python" %}
{% set version = "2.2.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/segment-analytics-python/segment-analytics-python-2.2.3.tar.gz
  sha256: 0df5908e3df74b4482f33392fdd450df4c8351bf54974376fbe6bf33b0700865

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  skip: true  # [py<39]

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - requests >=2.7,<3.0
    - backoff >=2.1,<3.0
    - python-dateutil >=2.2,<3.0
    - monotonic >=1.5,<2.0

test:
  imports:
    - segment.analytics
    - segment.analytics.client
    - segment.analytics.consumer
    - segment.analytics.request
    - segment.analytics.utils
  commands:
    - pip check
    - python -c "import segment.analytics; client = segment.analytics.Client('test-key'); print('Client created successfully')"
    - python -c "from segment.analytics.client import Client; c = Client('test'); print('Direct import works')"
  requires:
    - pip

about:
  home: https://github.com/segmentio/analytics-python
  summary: The hassle-free way to integrate analytics into any python application.
  description: |
      Segment is the simplest way to integrate analytics into your application.
      One API allows you to turn on any other analytics service. No more learning
      new APIs, repeated code, and wasted development time.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/segmentio/analytics-python
  doc_url: https://github.com/segmentio/analytics-python/blob/master/README.md

extra:
  recipe-maintainers:
    - xylar
